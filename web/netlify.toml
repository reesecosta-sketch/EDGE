# Netlify config for the Next.js app (lives in web/).
# In the Netlify UI, set "Base directory" = web  so these paths resolve.
# The official Next.js runtime plugin handles SSR/App Router automatically.

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Live data (optional): set these in Netlify → Site settings → Environment variables.
# The app runs on sample data until they're present. Only the PUBLIC anon key ever
# goes in the frontend — never the service-role key or any odds/stats API key.
#   NEXT_PUBLIC_SUPABASE_URL
#   NEXT_PUBLIC_SUPABASE_ANON_KEY
